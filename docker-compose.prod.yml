services:

  # ── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: his-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE:      hospital_his
    volumes:
      - mongo-data:/data/db
    networks:
      - his-net
    # MongoDB is NOT exposed to the internet — internal only

  # ── NestJS API ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: his-api:latest
    container_name: his-api
    restart: always
    environment:
      MONGO_URI:      mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/hospital_his?authSource=admin
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: 12h
      API_PORT:       4000
      CORS_ORIGIN:    https://${DOMAIN},https://www.${DOMAIN}
    depends_on:
      - mongo
    networks:
      - his-net

  # ── Next.js Frontend ───────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    image: his-web:latest
    container_name: his-web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    depends_on:
      - api
    networks:
      - his-net

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: his-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - his-net

networks:
  his-net:
    driver: bridge

volumes:
  mongo-data:
