# ── HTTP → HTTPS redirect + Certbot challenge ──────────────────
server {
    listen 80;
    server_name YOURDOMAIN.mn www.YOURDOMAIN.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOURDOMAIN.mn www.YOURDOMAIN.mn;

    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.mn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options      "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy      "strict-origin" always;

    # Allow large uploads (logo / stamp images)
    client_max_body_size 25m;

    # ── API proxy (/api/*) ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://his-api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Frontend (Next.js) ─────────────────────────────────────
    location / {
        proxy_pass         http://his-web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
