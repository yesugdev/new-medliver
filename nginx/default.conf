# HTTP → HTTPS redirect (IP хандалтыг ч domain руу чиглүүлнэ)
server {
    listen 80;
    server_name app.medliver.mn www.app.medliver.mn 109.123.232.200;
    return 301 https://app.medliver.mn$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name app.medliver.mn www.app.medliver.mn;

    ssl_certificate     /etc/letsencrypt/live/app.medliver.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.medliver.mn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # web/api container rebuild хийгдэж байх (deploy) үед upstream
    # түр холбогдохгүй байвал raw 502/503/504-ийн оронд энэ static
    # хуудсыг харуулна — нэмэлт алхам хэрэггүйгээр бүх deploy дээр ажиллана.
    proxy_intercept_errors on;
    error_page 502 503 504 = @maintenance;

    location @maintenance {
        root /usr/share/nginx/html;
        try_files /maintenance.html =502;
        add_header Retry-After 60 always;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        proxy_pass         http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 3s;
        client_max_body_size 15M;
    }

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 3s;
    }
}
